        }

        }

        .map-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #map { 
            width: 100%;
            height: 100%;
            background-color: #a3ccff;
        }

        /* === VENTANA DE TÍTULO PREMIUM === */
        .map-title {
            position: absolute;
            z-index: 1100;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 14px 22px;
            color: white;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);

            font-size: 1.25rem;
            font-weight: 700;

        }

        .map-title p {

            font-size: 0.8rem;
            opacity: 0.85;
        }

            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1200;
            display: flex;
            align-items: center; 
            gap: 12px;
            pointer-events: none;
        }

            display: flex;

        }

            text-decoration: none;

            display: none;
        }

    const layerAccidentesRD = L.layerGroup().addTo(map);

    // --- HELPER DE IDENTIFICACIÓN ---
    function esHaiti(lng, titulo) {
        const titulosHaiti = [
            "Cabo Jacmel", "Península de Tiburón", "Isla de La Vaca", 
            "Isla de Cayemite", "Isla de Gonave", "Golfo de Gonave", 
            "Isla de La Tortuga", "Isla de Navassa", "Bahía del Fuerte Libertad", 
            "Península del Noroeste"
        ];
        return titulosHaiti.includes(titulo) || lng < -71.84;
    }

    function esRioHaiti(nombre) {
        const riosHaiti = ["Río Artibonito", "Río Mapou", "Río Grande del norte", "Río Momance", "Río Ravine"];
        return riosHaiti.includes(nombre);
    }

    // --- GENERACIÓN DE APUNTADORES SVG VECTORIALES ---
    function crearApuntadorSVG(colorHex) {
        return L.divIcon({
            className: 'custom-svg-marker',
            html: `
                <svg width="26" height="36" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 3px 4px rgba(0,0,0,0.45));">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 8.25 10.5 16.5 11.13 17.13a1.23 1.23 0 0 0 1.74 0C13.5 28.5 24 20.25 24 12c0-6.63-5.37-12-12-12zm0 16.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z" fill="${colorHex}"/>
                    <circle cx="12" cy="12" r="4.5" fill="#FFFFFF"/>
                </svg>
            `,
            iconSize: [26, 36],
            iconAnchor: [13, 36],
            popupAnchor: [0, -32]
        });
    }

    // Apuntadores solicitados con colores hexadecimales exactos
    const iconoRD = crearApuntadorSVG('#2A82CA'); // Apuntador Azul
    const iconoHaiti = crearApuntadorSVG('#6633CC'); // Apuntador Morado

    // Inyectar Accidentes Costeros en sus respectivas capas
    puntos.forEach(p => {
        const popupContent = `
            <div style="text-align: center;">
                <strong style="font-size: 0.95rem; color: #1a365d; display: block; margin-bottom: 4px;">📍 ${p.titulo}</strong>
                <span style="font-size: 0.85rem; color: #666; font-style: italic;">${p.comentario}</span>
            </div>`;

        if (esHaiti(p.lng, p.titulo)) {
            L.marker([p.lat, p.lng], { icon: iconoHaiti }).bindPopup(popupContent).addTo(layerAccidentesHAITI);
        } else {
            L.marker([p.lat, p.lng], { icon: iconoRD }).bindPopup(popupContent).addTo(layerAccidentesRD);
        }
    });

    // --- CONTROL DE TAMAÑO DINÁMICO DE RÍOS ---
    function calcularRadioRios(zoom) {
        if (zoom <= 7) return 4;
        if (zoom <= 9) return 6;
        if (zoom <= 11) return 9;
        if (zoom <= 13) return 13;
        return 18;
    }

    // Inyectar Ríos Circulares en sus capas correspondientes
    const listaCirculosRios = [];

    rios.forEach(rio => {
        const esH = esRioHaiti(rio.nombre);
        const colorRío = esH ? '#FF6600' : '#FF0000'; // Naranja para Haití, Rojo para RD
        const capaDestino = esH ? layerRiosHAITI : layerRiosRD;

        const circulo = L.circleMarker(rio.coordenadas, {
            radius: calcularRadioRios(map.getZoom()),
            color: '#FFFFFF',
            fillColor: colorRío,
            fillOpacity: 0.85,
            weight: 1.5
        })
        .bindPopup(`
            <div style="text-align: center;">
                <strong style="font-size: 0.95rem; color: #8c0000; display: block; margin-bottom: 4px;">🌊 ${rio.nombre}</strong>
                <span style="font-size: 0.85rem; color: #666; font-style: italic;">${rio.comentario}</span>
            </div>
        `)
        .addTo(capaDestino);

        listaCirculosRios.push({ marker: circulo });
    });

    // Actualizar radio de círculos al cambiar de zoom
    map.on('zoomend', () => {
        const nuevoRadio = calcularRadioRios(map.getZoom());
        listaCirculosRios.forEach(item => {
            item.marker.setRadius(nuevoRadio);
        });
    });

                        <span class="legend-label-text">Desembocadura ríos HAITÍ</span>
                    </label>
                    <div style="border-top: 1px solid rgba(255,255,255,0.15); margin-top: 8px; padding-top: 10px;">
                        <div style="font-size:0.78rem; color:rgba(255,255,255,0.6); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Vista del mapa</div>
                        <div style="display:flex; gap:6px;">
                            <button id="btn-calles" onclick="cambiarVista('calles')" style="flex:1; padding:5px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.3); background:rgba(255,179,71,0.9); color:#000; font-size:0.75rem; font-weight:700; cursor:pointer;">🗺️ Calles</button>
                            <button id="btn-satelite" onclick="cambiarVista('satelite')" style="flex:1; padding:5px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:#fff; font-size:0.75rem; font-weight:600; cursor:pointer;">🛰️ Satélite</button>
                        </div>
                    </div>
                </div>
            </details>
        `;
        
        // Prevenir eventos de arrastre o clic sobre el mapa debajo de la leyenda
        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);
        
        return div;
    };

    controlLeyendaCapas.addTo(map);

    // --- GESTIÓN DE CHECKBOXES INTERACTIVOS DE CAPAS ---
    document.getElementById('chk-acc-rd').addEventListener('change', function(e) {
        if (e.target.checked) map.addLayer(layerAccidentesRD);
        else map.removeLayer(layerAccidentesRD);
    });

    document.getElementById('chk-acc-ht').addEventListener('change', function(e) {
        if (e.target.checked) map.addLayer(layerAccidentesHAITI);
        else map.removeLayer(layerAccidentesHAITI);
    });

    document.getElementById('chk-rios-rd').addEventListener('change', function(e) {
        if (e.target.checked) map.addLayer(layerRiosRD);
        else map.removeLayer(layerRiosRD);
    });

    document.getElementById('chk-rios-ht').addEventListener('change', function(e) {
        if (e.target.checked) map.addLayer(layerRiosHAITI);
        else map.removeLayer(layerRiosHAITI);
    });

    // --- CAMBIO DE VISTA BASE ---
    function cambiarVista(modo) {
        map.removeLayer(capaBaseActual);
        if (modo === 'satelite') {
            capaBaseActual = capaSatelite;
            document.getElementById('btn-satelite').style.background = 'rgba(255,179,71,0.9)';
            document.getElementById('btn-satelite').style.color = '#000';
            document.getElementById('btn-satelite').style.fontWeight = '700';
            document.getElementById('btn-calles').style.background = 'rgba(255,255,255,0.1)';
            document.getElementById('btn-calles').style.color = '#fff';
            document.getElementById('btn-calles').style.fontWeight = '600';
        } else {
            capaBaseActual = capaCalles;
            document.getElementById('btn-calles').style.background = 'rgba(255,179,71,0.9)';
            document.getElementById('btn-calles').style.color = '#000';
            document.getElementById('btn-calles').style.fontWeight = '700';
            document.getElementById('btn-satelite').style.background = 'rgba(255,255,255,0.1)';
            document.getElementById('btn-satelite').style.color = '#fff';
            document.getElementById('btn-satelite').style.fontWeight = '600';
        }
        capaBaseActual.addTo(map);
        // Las capas de datos deben quedar encima
        map.removeLayer(layerAccidentesRD); map.addLayer(layerAccidentesRD);
        map.removeLayer(layerAccidentesHAITI); map.addLayer(layerAccidentesHAITI);
        map.removeLayer(layerRiosRD); map.addLayer(layerRiosRD);
        map.removeLayer(layerRiosHAITI); map.addLayer(layerRiosHAITI);
    }

    // --- CONTROL DE RESPONSIVIDAD Y REDIMENSIÓN ---
    window.addEventListener('load', () => {
        setTimeout(moveScale, 200);
    });
    
    window.addEventListener('resize', () => {
        map.invalidateSize();
        moveScale();
    });
</script>
</body>
</html>
